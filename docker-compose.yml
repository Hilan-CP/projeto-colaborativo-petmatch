services:
  database:
    image: postgres:18-alpine
    container_name: postgresql
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS}
      - NODE_ENV=${ENV:-dev}
    ports:
      - "5432:5432"
    volumes:
      - petmatch_data:/var/lib/postgresql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: petmatch-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${ENV:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_SENDER_EMAIL=${RESEND_SENDER_EMAIL}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ./server:/usr/src/app
      - node_modules_server:/usr/src/app/node_modules

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: petmatch-web
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./web:/usr/src/app
      - node_modules_web:/usr/src/app/node_modules

networks:
  backend:
    driver: bridge

volumes:
  petmatch_data:
  node_modules_server:
  node_modules_web: